<!DOCTYPE html>
<html>

<head>
    <title>Register</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="flex justify-center items-center h-screen">

        <form action="/register" method="POST" class="bg-white p-8 rounded shadow w-96">

            <h1 class="text-3xl font-bold mb-5 text-center">
                Register
            </h1>

            <input type="text" name="name" placeholder="Name" required class="w-full border p-3 mb-4" />

            <input type="email" name="email" placeholder="Email" required class="w-full border p-3 mb-4" />

            <input type="password" name="password" placeholder="Password" required class="w-full border p-3 mb-4" />

            <button class="bg-green-500 text-white w-full p-3 rounded">
                Register
            </button>

        </form>

    </div>

</body>

</html>
