<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">




    <nav class="bg-blue-600 text-white p-4 flex justify-between">

        <h1 class="text-2xl font-bold">
            SISTec IoT Application 2026
        </h1>

        <h2 id="username"></h2>

    </nav>







    <div class="p-6">




        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

            <div class="bg-white p-6 rounded shadow">

                <h2 class="text-xl font-bold">
                    Temperature
                </h2>

                <h1 id="temp" class="text-6xl font-bold mt-4">
                    --
                </h1>

                <p id="tempTime"></p>

            </div>





            <div class="bg-white p-6 rounded shadow">

                <h2 class="text-xl font-bold">
                    Humidity
                </h2>

                <h1 id="hum" class="text-6xl font-bold mt-4">
                    --
                </h1>

                <p id="humTime"></p>

            </div>

        </div>








        <div class="bg-white p-6 rounded shadow mt-8">

            <h2 class="text-2xl font-bold mb-4">
                LCD Message
            </h2>

            <form id="lcdForm">

                <textarea maxlength="16" id="lcdText" class="border w-full p-4 h-32"
                    placeholder="Enter LCD Text"></textarea>

                <button class="bg-green-500 text-white p-3 rounded mt-4">
                    Submit
                </button>

            </form>

        </div>









        <div class="bg-white p-6 rounded shadow mt-8 overflow-auto">

            <h2 class="text-2xl font-bold mb-4">
                Sensor Records
            </h2>

            <table class="w-full border">

                <thead>

                    <tr class="bg-gray-200">

                        <th class="border p-2">#</th>
                        <th class="border p-2">Temperature</th>
                        <th class="border p-2">Humidity</th>
                        <th class="border p-2">Time</th>
                        <th class="border p-2">Date</th>
                        <th class="border p-2">Action</th>

                    </tr>

                </thead>

                <tbody id="tableData"></tbody>

            </table>

        </div>

    </div>








    <script>

        fetch("/get-user")
            .then(res => res.json())
            .then(data => {
                document.getElementById("username").innerHTML =
                    "Welcome " + data.name;
            });






        fetch("/latest-data")
            .then(res => res.json())
            .then(data => {

                document.getElementById("temp").innerHTML =
                    data.temperature + " °C";

                document.getElementById("hum").innerHTML =
                    data.humidity + " %";

                document.getElementById("tempTime").innerHTML =
                    data.time + " | " + data.date;

                document.getElementById("humTime").innerHTML =
                    data.time + " | " + data.date;
            });







        fetch("/all-data")
            .then(res => res.json())
            .then(data => {

                let output = "";

                data.forEach((item, index) => {

                    output += `
      <tr>

      <td class="border p-2">${index + 1}</td>

      <td class="border p-2">
      ${item.temperature} °C
      </td>

      <td class="border p-2">
      ${item.humidity} %
      </td>

      <td class="border p-2">
      ${item.time}
      </td>

      <td class="border p-2">
      ${item.date}
      </td>

      <td class="border p-2">

      <a
      href="/delete/${index}"
      class="bg-red-500 text-white px-3 py-1 rounded">

      Delete

      </a>

      </td>

      </tr>
    `;
                });

                document.getElementById("tableData").innerHTML = output;

            });








        document.getElementById("lcdForm")
            .addEventListener("submit", async function (e) {

                e.preventDefault();

                const text =
                    document.getElementById("lcdText").value;

                await fetch("/save-lcd", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({ text })

                });

                alert("LCD Text Saved");

            });

    </script>

</body>

</html>
